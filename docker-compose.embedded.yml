# Override pour stack 100 % Docker (sans daemons sur l'hôte)
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.embedded.yml \
#     --profile embedded-ipfs --profile embedded-tajcoin up -d --build

services:
  core:
    network_mode: bridge
    ports:
      - "${PANEL_PORT:-8090}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ipfs
      - tajcoin
    environment:
      IPFS_API_URL: http://ipfs:5001
      PANEL_PORT: "8080"
      TAJCOIN_RPC_URL: http://tajcoin:12107
      TAJCOIN_COOKIE_FILE: ""
    volumes:
      - ./Tajcoin/data:/host-tajcoin
      - ./plugins:/tajnet/plugins
      - ./data:/tajnet/data
