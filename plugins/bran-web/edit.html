<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Éditeur — Bran Web</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="edit.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="theme-enfants-foret bran-editor">

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <nav>
    <a href="index.html" class="nav-logo">BRAN<span>EDIT</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Archive démo ↗</a></li>
      <li><a href="/panel/#bran-web">TajPanel</a></li>
    </ul>
    <div class="nav-status"><div class="status-dot"></div>ÉDITEUR · CLIENT</div>
  </nav>

  <div class="app-wrapper">
    <div class="editor-toolbar">
      <label class="title-field">
        <span>Titre</span>
        <input type="text" id="archiveTitle" placeholder="Mon archive Bran Web" autocomplete="off">
      </label>
      <button type="button" class="btn" id="previewBtn">Prévisualiser</button>
      <button type="button" class="btn btn-primary" id="publishBtn">Publier IPFS · <span id="publishPriceLabel">2 TAJ</span></button>
    </div>

    <div class="section-bar">
      <span class="section-bar-label">Sections</span>
      <div id="sectionTabs" class="section-tabs"></div>
      <button type="button" class="btn btn-add" id="addSectionBtn" title="Ajouter une section">+ Section</button>
    </div>

    <p id="editorStatus" class="editor-status" role="status"></p>

    <div class="editor-layout">
      <div class="editor-pane">
        <div class="pane-head">
          <span id="activeSectionLabel">bio.md</span>
          <button type="button" class="btn-remove hidden" id="removeSectionBtn" title="Supprimer cette section">Supprimer</button>
        </div>
        <textarea id="sectionEditor" spellcheck="false" aria-label="Contenu Markdown de la section"></textarea>
      </div>

      <div class="editor-pane preview-pane">
        <div class="pane-head">Aperçu — gratuit</div>
        <div class="preview-scroll markdown-body" id="sectionPreview">
          <p class="loader">Éditez votre section…</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/wallet/wallet-provider.js"></script>
  <script src="/wallet/auth-metamask.js"></script>
  <script src="/panel/taj-pay.js"></script>
  <script src="/panel/paid-services.js"></script>
  <script src="edit.js" defer></script>
</body>
</html>
